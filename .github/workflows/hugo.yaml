# Builds and deploys the Hugo site to GitHub Pages.
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - hugo

  workflow_dispatch:

  schedule:
    # nightly rebuild to pick up latest release info from app repos
    - cron: '0 9 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.2
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: |
            /tmp/hugo_cache
            resources/_gen/images
          key: hugo-${{ env.HUGO_VERSION }}-${{ hashFiles('content/**', 'themes/**', 'config/**') }}
          restore-keys: hugo-${{ env.HUGO_VERSION }}-

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          TZ: America/Los_Angeles
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          hugo \
            --gc \
            --minify \
            --cacheDir /tmp/hugo_cache

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
