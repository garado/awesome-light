<div class="modal-overlay" id="modal-overlay" aria-hidden="true">
  <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
  <button class="modal-prev" id="modal-prev" aria-label="Previous">&#8592;</button>
  <div class="modal" role="dialog" aria-modal="true">
    <div>
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-author" id="modal-author"></p>
    </div>
    <div class="modal-media" id="modal-media"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
  <button class="modal-next" id="modal-next" aria-label="Next">&#8594;</button>
  <div class="modal-mobile-bar">
    <button class="modal-mobile-nav" id="modal-mobile-prev" aria-label="Previous">&#8592;</button>
    <button class="modal-mobile-close" id="modal-mobile-close">Close</button>
    <button class="modal-mobile-nav" id="modal-mobile-next" aria-label="Next">&#8594;</button>
  </div>
</div>
